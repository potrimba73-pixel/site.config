<section id="welcome" class="content-section active">
    <div class="dashboard-grid">
        <!-- Configurações de Texto -->
        <div class="panel-card">
            <div class="panel-header">
                <h3><i class="fas fa-comment-dots"></i> Mensagem de Boas-vindas</h3>
                <label class="switch">
                    <input type="checkbox" id="welcome-enabled" data-config="welcome.enabled">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="welcome-content">
                <div class="form-group">
                    <label>Enviar para</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="welcome-send" value="channel" checked data-config="welcome.sendType">
                            Canal
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="welcome-send" value="dm" data-config="welcome.sendType">
                            DM
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Canal de Boas-vindas <span class="required">*</span></label>
                    <div class="channel-input">
                        <span class="channel-hash">#</span>
                        <input type="text" id="welcome-channel" placeholder="boas-vindas" data-config="welcome.channelId">
                    </div>
                </div>
                <div class="form-group">
                    <label>Mensagem de Boas-vindas</label>
                    <textarea id="welcome-message" rows="4" data-config="welcome.message">Entrou um novo membro, [user]! Diverte-te connosco! Agora há [memberCount] membros! 👍</textarea>
                    <div class="variables-help">
                        <span class="var-tag">[user]</span>
                        <span class="var-tag">[userName]</span>
                        <span class="var-tag">[memberCount]</span>
                        <span class="var-tag">[server]</span>
                        <span class="var-tag">[inviter]</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Configuração da Imagem -->
        <div class="panel-card">
            <div class="panel-header">
                <h3><i class="fas fa-image"></i> Imagem de Boas-vindas</h3>
                <label class="switch">
                    <input type="checkbox" id="welcome-image-enabled" data-config="welcome.imageEnabled">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="welcome-image-config" style="display: none;">
                
                <!-- Tabs -->
                <div class="image-tabs">
                    <button class="tab-btn active" data-tab="background">Imagem de fundo</button>
                    <button class="tab-btn" data-tab="avatar">Avatar</button>
                    <button class="tab-btn" data-tab="username">Nome do Utilizador</button>
                    <button class="tab-btn" data-tab="text">Texto</button>
                </div>

                <!-- Preview -->
                <div class="welcome-canvas-wrapper">
                    <canvas id="welcome-canvas" width="1024" height="450"></canvas>
                    <div class="canvas-loading" id="canvas-loading">A carregar preview...</div>
                </div>

                <!-- Controles da Tab Ativa -->
                <div class="tab-contents">
                    
                    <!-- BACKGROUND -->
                    <div class="tab-content active" data-content="background">
                        <div class="form-group">
                            <label>URL da Imagem de Fundo</label>
                            <input type="text" id="bg-image-url" placeholder="https://..." data-config="welcome.image.backgroundUrl">
                            <span class="help-text">Ou escolhe uma da galeria abaixo</span>
                        </div>
                        <div class="form-group">
                            <label>Galeria de Fundos</label>
                            <div class="bg-gallery" id="bg-gallery">
                                <div class="bg-thumb active" data-url="https://probot.media/muc2fw4ibY.png">
                                    <img src="https://probot.media/muc2fw4ibY.png" alt="ProBot">
                                </div>
                                <div class="bg-thumb" data-url="https://i.imgur.com/8Km9tLL.jpg">
                                    <img src="https://i.imgur.com/8Km9tLL.jpg" alt="Abstract">
                                </div>
                                <div class="bg-thumb" data-url="https://i.imgur.com/Zk6TR5k.jpg">
                                    <img src="https://i.imgur.com/Zk6TR5k.jpg" alt="Space">
                                </div>
                                <div class="bg-thumb" data-url="https://i.imgur.com/JYUB0mG.jpg">
                                    <img src="https://i.imgur.com/JYUB0mG.jpg" alt="City">
                                </div>
                                <div class="bg-thumb" data-url="https://i.imgur.com/4NZh8zF.jpg">
                                    <img src="https://i.imgur.com/4NZh8zF.jpg" alt="Nature">
                                </div>
                                <div class="bg-thumb" data-url="https://i.imgur.com/Qn3dYHx.jpg">
                                    <img src="https://i.imgur.com/Qn3dYHx.jpg" alt="Gradient">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Overlay Opacidade</label>
                            <div class="range-with-value">
                                <input type="range" id="bg-overlay-opacity" min="0" max="100" value="50" data-config="welcome.image.overlayOpacity">
                                <span class="range-value" id="overlay-value">50%</span>
                            </div>
                        </div>
                    </div>

                    <!-- AVATAR -->
                    <div class="tab-content" data-content="avatar">
                        <div class="form-row compact">
                            <div class="form-group">
                                <label>Posição X</label>
                                <div class="coord-control">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('avatar-x', -10)"><i class="fas fa-minus"></i></button>
                                    <input type="number" id="avatar-x" value="512" data-config="welcome.image.avatarX">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('avatar-x', 10)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Posição Y</label>
                                <div class="coord-control">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('avatar-y', -10)"><i class="fas fa-minus"></i></button>
                                    <input type="number" id="avatar-y" value="180" data-config="welcome.image.avatarY">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('avatar-y', 10)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="form-row compact">
                            <div class="form-group">
                                <label>Tamanho</label>
                                <div class="coord-control">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('avatar-size', -5)"><i class="fas fa-minus"></i></button>
                                    <input type="number" id="avatar-size" value="140" data-config="welcome.image.avatarSize">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('avatar-size', 5)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Forma</label>
                                <select id="avatar-shape" data-config="welcome.image.avatarShape">
                                    <option value="circle">Círculo</option>
                                    <option value="square">Quadrado</option>
                                    <option value="rounded">Cantos Arredondados</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Borda</label>
                            <div class="range-with-value">
                                <input type="range" id="avatar-border" min="0" max="20" value="6" data-config="welcome.image.avatarBorder">
                                <span class="range-value" id="border-value">6px</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Cor da Borda</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="avatar-border-color" value="#ffffff" data-config="welcome.image.avatarBorderColor">
                                <input type="text" class="color-hex" id="avatar-border-hex" value="#ffffff">
                            </div>
                        </div>
                    </div>

                    <!-- USERNAME -->
                    <div class="tab-content" data-content="username">
                        <div class="form-row compact">
                            <div class="form-group">
                                <label>Posição X</label>
                                <div class="coord-control">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('username-x', -10)"><i class="fas fa-minus"></i></button>
                                    <input type="number" id="username-x" value="512" data-config="welcome.image.usernameX">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('username-x', 10)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Posição Y</label>
                                <div class="coord-control">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('username-y', -5)"><i class="fas fa-minus"></i></button>
                                    <input type="number" id="username-y" value="340" data-config="welcome.image.usernameY">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('username-y', 5)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tamanho da Fonte</label>
                            <div class="coord-control">
                                <button class="btn-icon btn-sm" onclick="adjustValue('username-size', -2)"><i class="fas fa-minus"></i></button>
                                <input type="number" id="username-size" value="42" data-config="welcome.image.usernameSize">
                                <button class="btn-icon btn-sm" onclick="adjustValue('username-size', 2)"><i class="fas fa-plus"></i></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Cor do Texto</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="username-color" value="#ffffff" data-config="welcome.image.usernameColor">
                                <input type="text" class="color-hex" id="username-hex" value="#ffffff">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Fonte</label>
                            <select id="username-font" data-config="welcome.image.usernameFont">
                                <option value="Discord">Discord (GG Sans)</option>
                                <option value="Roboto">Roboto</option>
                                <option value="Open Sans">Open Sans</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Poppins">Poppins</option>
                                <option value="Oswald">Oswald</option>
                                <option value="Bebas Neue">Bebas Neue</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Alinhamento</label>
                            <select id="username-align" data-config="welcome.image.usernameAlign">
                                <option value="center">Centro</option>
                                <option value="left">Esquerda</option>
                                <option value="right">Direita</option>
                            </select>
                        </div>
                    </div>

                    <!-- TEXT -->
                    <div class="tab-content" data-content="text">
                        <div class="form-group">
                            <label>Texto Personalizado</label>
                            <input type="text" id="custom-text" value="BEM-VINDO AO SERVIDOR!" data-config="welcome.image.customText">
                        </div>
                        <div class="form-row compact">
                            <div class="form-group">
                                <label>Posição X</label>
                                <div class="coord-control">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('text-x', -10)"><i class="fas fa-minus"></i></button>
                                    <input type="number" id="text-x" value="512" data-config="welcome.image.textX">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('text-x', 10)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Posição Y</label>
                                <div class="coord-control">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('text-y', -5)"><i class="fas fa-minus"></i></button>
                                    <input type="number" id="text-y" value="100" data-config="welcome.image.textY">
                                    <button class="btn-icon btn-sm" onclick="adjustValue('text-y', 5)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tamanho da Fonte</label>
                            <div class="coord-control">
                                <button class="btn-icon btn-sm" onclick="adjustValue('text-size', -2)"><i class="fas fa-minus"></i></button>
                                <input type="number" id="text-size" value="56" data-config="welcome.image.textSize">
                                <button class="btn-icon btn-sm" onclick="adjustValue('text-size', 2)"><i class="fas fa-plus"></i></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Cor do Texto</label>
                            <div class="color-picker-wrapper">
                                <input type="color" id="text-color" value="#F0E130" data-config="welcome.image.textColor">
                                <input type="text" class="color-hex" id="text-hex" value="#F0E130">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Fonte</label>
                            <select id="text-font" data-config="welcome.image.textFont">
                                <option value="Bebas Neue">Bebas Neue</option>
                                <option value="Discord">Discord (GG Sans)</option>
                                <option value="Roboto">Roboto</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Poppins">Poppins</option>
                                <option value="Oswald">Oswald</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Alinhamento</label>
                            <select id="text-align" data-config="welcome.image.textAlign">
                                <option value="center">Centro</option>
                                <option value="left">Esquerda</option>
                                <option value="right">Direita</option>
                            </select>
                        </div>
                    </div>

                </div>

                <!-- Layout Global -->
                <div class="form-group layout-selector">
                    <label>Layout</label>
                    <div class="layout-options">
                        <div class="layout-option active" data-layout="classic">
                            <div class="layout-preview classic"></div>
                            <span>Clássico</span>
                        </div>
                        <div class="layout-option" data-layout="textonly">
                            <div class="layout-preview textonly"></div>
                            <span>Texto</span>
                        </div>
                        <div class="layout-option" data-layout="left">
                            <div class="layout-preview left"></div>
                            <span>Esquerda</span>
                        </div>
                        <div class="layout-option" data-layout="right">
                            <div class="layout-preview right"></div>
                            <span>Direita</span>
                        </div>
                    </div>
                    <input type="hidden" id="image-layout" value="classic" data-config="welcome.image.layout">
                </div>

            </div>
        </div>
    </div>

    <!-- JSON Preview -->
    <div class="panel-card" style="margin-top: 20px;">
        <div class="panel-header">
            <h3><i class="fas fa-code"></i> Preview do JSON</h3>
            <button class="btn btn-sm btn-secondary" id="copy-json"><i class="fas fa-copy"></i> Copiar</button>
        </div>
        <div class="form-group">
            <pre class="json-preview" id="json-preview"></pre>
        </div>
    </div>

    <!-- Botões de Ação -->
    <div class="action-bar">
        <button class="btn btn-secondary" id="save-draft"><i class="fas fa-save"></i> Guardar Rascunho</button>
        <button class="btn btn-primary" id="save-config"><i class="fas fa-download"></i> Aplicar Configurações</button>
    </div>
</section>
